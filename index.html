<!DOCTYPE html> <html lang="pt-br"> <head> <meta charset="UTF-8"> <title>Dashboard NR 12 - GRUPO KOCK - Açougue</title> <script src="https://cdn.jsdelivr.net/npm/chart.js"></script> <style> :root { --primary: #1e3a8a; --success: #22c55e; --warning: #eab308; --danger: #ef4444; --bg: #f8fafc; } body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); margin: 0; padding: 20px; color: #1e293b; } .container { max-width: 1200px; margin: auto; } header { background: var(--primary); color: white; padding: 20px; border-radius: 12px; margin-bottom: 25px; display: flex; justify-content: space-between; align-items: center; } .dashboard-grid { display: grid; grid-template-columns: 350px 1fr; gap: 20px; margin-bottom: 30px; } .chart-box { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); text-align: center; } .stats-cards { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; } .card { background: white; padding: 20px; border-radius: 12px; text-align: center; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); border-top: 4px solid #cbd5e1; } .card.concluido { border-color: var(--success); } .card.andamento { border-color: var(--warning); } .card.pendente { border-color: var(--danger); } .card .value { font-size: 28px; font-weight: bold; margin: 5px 0; } .card .label { font-size: 12px; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; } .table-container { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); } table { width: 100%; border-collapse: collapse; } th { background: #f1f5f9; padding: 15px; text-align: left; font-size: 13px; color: #475569; } td { padding: 12px 15px; border-bottom: 1px solid #f1f5f9; font-size: 14px; } .editable:hover { background: #fffbeb; outline: 1px dashed #f59e0b; cursor: text; } select { padding: 6px; border-radius: 6px; border: 1px solid #cbd5e1; width: 100%; cursor: pointer; } .loja-header { background: #e2e8f0; font-weight: bold; color: #1e3a8a; } @media print { .no-print { display: none; } } </style> </head> <body> <div class="container"> <header> <div> <h1 style="margin:0">Controle de Treinamentos NR 12</h1> <p style="margin:5px 0 0">Setor Açougue | Monitoramento por Unidades</p> </div> <button class="no-print" onclick="window.print()" style="padding:10px 20px; cursor:pointer; background:#f59e0b; color:white; border:none; border-radius:8px; font-weight:bold;">Imprimir Relatório</button> </header> <div class="dashboard-grid"> <div class="chart-box"> <h3>Status Global (%)</h3> <canvas id="pizzaChart"></canvas> </div> <div class="stats-cards"> <div class="card concluido"> <div class="label">Concluídos</div> <div class="value" id="valC">0</div> <div id="percC" style="color:var(--success); font-weight:bold">0%</div> </div> <div class="card andamento"> <div class="label">Em Andamento</div> <div class="value" id="valA">0</div> <div id="percA" style="color:var(--warning); font-weight:bold">0%</div> </div> <div class="card pendente"> <div class="label">Pendentes</div> <div class="value" id="valP">0</div> <div id="percP" style="color:var(--danger); font-weight:bold">0%</div> </div> <div class="card"> <div class="label">Total Colaboradores</div> <div class="value" id="valT">0</div> <div style="color:#64748b">100%</div> </div> </div> </div> <div class="table-container"> <table> <thead> <tr> <th width="100">Loja</th> <th>Nome do Funcionário</th> <th width="200">Status do Curso</th> <th width="150">Última Reciclagem</th> </tr> </thead> <tbody id="tabelaCorpo"> <!-- Inserção dinâmica via JS para organização --> </tbody> </table> </div> </div> <script> const configLojas = [ { id: 13, nomes: 8 }, { id: 29, nomes: 6 }, { id: 47, nomes: 2 }, { id: 54, nomes: 8 }, { id: 67, nomes: 2 }, { id: 75, nomes: 2 }, { id: 79, nomes: 2 }, { id: 83, nomes: 2 }, { id: 84, nomes: 2 }, { id: 85, nomes: 2 }, { id: 90, nomes: 4 }, { id: 91, nomes: 4 } ]; function popularTabela() { const corpo = document.getElementById('tabelaCorpo'); configLojas.forEach(loja => { for(let i = 1; i <= loja.nomes; i++) { const tr = document.createElement('tr'); tr.innerHTML = ` <td class="loja-header">Loja ${loja.id}</td> <td class="editable" contenteditable="true">Funcionário ${i}</td> <td> <select class="status-sel"> <option value="pendente">Pendente</option> <option value="andamento">Em Andamento</option> <option value="concluido">Concluído</option> </select> </td> <td class="editable" contenteditable="true">--/--/--</td> `; corpo.appendChild(tr); } }); } let myChart; function initChart() { const ctx = document.getElementById('pizzaChart').getContext('2d'); myChart = new Chart(ctx, { type: 'pie', data: { labels: ['Concluído', 'Em Andamento', 'Pendente'], datasets: [{ data: [0, 0, 0], backgroundColor: ['#22c55e', '#eab308', '#ef4444'], borderWidth: 2 }] }, options: { plugins: { legend: { position: 'bottom' } } } }); } function atualizarCalculos() { const selects = document.querySelectorAll('.status-sel'); let c = 0, a = 0, p = 0; selects.forEach(s => { if(s.value === 'concluido') c++; else if(s.value === 'andamento') a++; else p++; }); const total = selects.length; document.getElementById('valC').innerText = c; document.getElementById('valA').innerText = a; document.getElementById('valP').innerText = p; document.getElementById('valT').innerText = total; if(total > 0) { document.getElementById('percC').innerText = Math.round((c/total)*100) + '%'; document.getElementById('percA').innerText = Math.round((a/total)*100) + '%'; document.getElementById('percP').innerText = Math.round((p/total)*100) + '%'; myChart.data.datasets[0].data = [c, a, p]; myChart.update(); } } document.addEventListener('change', (e) => { if(e.target.classList.contains('status-sel')) atualizarCalculos(); }); window.onload = () => { popularTabela(); initChart(); atualizarCalculos(); }; </script> </body> </html>
